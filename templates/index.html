<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch | Modern AI Recommendations</title>
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <main class="container">
        
        <header class="header">
            <h1 class="logo">
                <i class="ti ti-movie"></i>
                CineMatch
            </h1>
            <p class="subtitle">Discover your next favorite cinematic experience through AI-powered content matching.</p>
        </header>

        <section class="controls-container">
            <div class="search-box">
                <i class="ti ti-search search-icon"></i>
                <input type="text" id="movie-search" placeholder="Type a movie you love (e.g., Inception, The Matrix)..." autocomplete="off">
                <button id="search-btn" class="glass-btn">Recommend</button>
            </div>
            
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="genre-filter"><i class="ti ti-category"></i> Genre</label>
                    <div class="custom-select-wrapper">
                        <select id="genre-filter">
                            <option value="All">All Genres</option>
                            <option value="Action">Action</option>
                            <option value="Drama">Drama</option>
                            <option value="Comedy">Comedy</option>
                            <option value="Science Fiction">Sci-Fi</option>
                            <option value="Thriller">Thriller</option>
                            <option value="Animation">Animation</option>
                            <option value="Family">Family</option>
                            <option value="Crime">Crime</option>
                            <option value="Romance">Romance</option>
                            <option value="Adventure">Adventure</option>
                        </select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="sort-filter"><i class="ti ti-sort-descending"></i> Sort By</label>
                    <div class="custom-select-wrapper">
                        <select id="sort-filter">
                            <option value="random">Recommended</option>
                            <option value="rating_desc">Rating: High to Low</option>
                            <option value="rating_asc">Rating: Low to High</option>
                            <option value="title_asc">Title: A-Z</option>
                            <option value="title_desc">Title: Z-A</option>
                        </select>
                    </div>
                </div>

                <div class="filter-group slider-group">
                    <label for="rating-filter">
                        <i class="ti ti-star-filled" style="color:var(--accent)"></i> Min Rating: <span id="rating-val">0</span>+
                    </label>
                    <input type="range" id="rating-filter" min="0" max="9.5" step="0.5" value="0">
                </div>
            </div>
            
            <div id="error-message" class="error-msg"></div>
        </section>

        <section class="results-section">
            <div class="section-header">
                <h2 id="results-title">Discover Something New</h2>
                <div class="loader" id="loader"></div>
            </div>
            
            <div class="movie-grid" id="movie-grid">
                <!-- Movie cards will be dynamically injected here -->
            </div>
        </section>
        
    </main>

    <footer class="footer">
        <p>Built for IntelliJ IDEA Execution &bull; Powered by scikit-learn & Flask</p>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
